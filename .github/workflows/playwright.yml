name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install backend dependencies
        working-directory: app/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "Werkzeug==2.0.3"

      - name: Install frontend dependencies
        working-directory: app/frontend/frontend
        run: |
          npm install
          npm install --save bootstrap-vue

      - name: Start Flask backend
        working-directory: app/backend
        run: |
          nohup python main.py > backend.log 2>&1 &

      - name: Start Vue frontend
        working-directory: app/frontend/frontend
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          nohup npm run serve -- --host localhost --port 8081 > frontend.log 2>&1 &

      - name: Wait for backend
        run: npx wait-on http://127.0.0.1:5000

      - name: Wait for frontend
        run: npx wait-on http://127.0.0.1:8081/games

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8081
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: app/backend/backend.log
          retention-days: 7

      - name: Upload frontend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-log
          path: app/frontend/frontend/frontend.log
          retention-days: 7